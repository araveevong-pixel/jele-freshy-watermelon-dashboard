name: Auto Update Dashboard

on:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: [main]
    paths:
      - 'scripts/tiktok_scraper.py'
      - '.github/workflows/auto-update.yml'
      - '.scrape-trigger'
  workflow_dispatch:
    inputs:
      actual_use:
        description: 'Actual Use amount (THB) — leave empty to skip'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yt-dlp curl-cffi
          yt-dlp --version

      - name: Setup TikTok cookies (if secret provided)
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: |
          if [ -n "$TIKTOK_COOKIES" ]; then
            echo "$TIKTOK_COOKIES" > /tmp/tiktok_cookies.txt
            LINES=$(wc -l < /tmp/tiktok_cookies.txt)
            FIRST=$(head -1 /tmp/tiktok_cookies.txt | head -c 80)
            HAS_TT=$(grep -c "tiktok.com" /tmp/tiktok_cookies.txt || echo 0)
            echo "✓ Cookies: $LINES lines, $HAS_TT tiktok.com entries"
            echo "  First line: $FIRST"
            echo "TIKTOK_COOKIES_FILE=/tmp/tiktok_cookies.txt" >> $GITHUB_ENV
          else
            echo "⚠ No TIKTOK_COOKIES secret set — scraper will run WITHOUT auth"
          fi

      - name: Run TikTok Scraper
        run: python3 scripts/tiktok_scraper.py scrape_results.json

      - name: Update Dashboard
        run: python3 scripts/update_dashboard.py scrape_results.json index.html

      - name: Update Actual Use (if provided)
        if: ${{ github.event.inputs.actual_use != '' }}
        run: python3 scripts/update_actual_use.py ${{ github.event.inputs.actual_use }} index.html

      - name: Commit and Push (with retry on remote conflicts)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html scrape_results.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-update dashboard $(date +'%Y-%m-%d %H:%M')"
          # Retry up to 3 times if remote has new commits
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed (attempt $i) — pulling with rebase and retrying..."
            git pull --rebase origin main
          done
          echo "Push failed after 3 attempts"
          exit 1
